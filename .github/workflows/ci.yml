name: CI API Gestionnaire de tâches

on:
  push:
    branches: [ "main" ] # Déclencheur sur le main

jobs:
  # 1. Vérification du format du code
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Configuration de Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Installation du linter
        run: pip install flake8
        
      - name: Exécution de Flake8
        # On ignore les erreurs mineures pour ne pas bloquer le TP inutilement (optionnel)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # 2. Exécution des tests automatisés
  test:
    runs-on: ubuntu-latest
    needs: lint # Fail fast : on ne teste pas si le lint échoue
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        
      - name: Configuration de Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Installation des dépendances
        run: |
          pip install -r requirements.txt
          
      - name: Exécution des tests
        run: pytest test_smoke.py

  # 3. Construction et envoi de l'image Docker
  build-and-push:
    runs-on: ubuntu-latest
    needs: test # Fail fast : on ne build pas si les tests échouent
    permissions:
      contents: read
      packages: write # Nécessaire pour pousser sur le registre GHCR
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        
      - name: Connexion au GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Aucun secret en clair, géré par GitHub
          
      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Tag explicite avec le SHA du commit pour garantir la traçabilité
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }}